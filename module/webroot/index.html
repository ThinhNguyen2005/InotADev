<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0d12">
<title>HideDevMode</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-aurora" aria-hidden="true"></div>

<header class="topbar">
    <div class="brand">
        <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2 4 6v6c0 5 3.4 9.4 8 10 4.6-.6 8-5 8-10V6l-8-4Zm-1 15-4-4 1.4-1.4L11 14.2l5.6-5.6L18 10l-7 7Z"/></svg>
        </div>
        <div>
            <h1 id="module-name">HideDevMode</h1>
            <p class="subtitle" id="module-version">v—</p>
        </div>
    </div>
    <button id="btn-reload" class="icon-btn" title="Tải lại trạng thái" aria-label="Tải lại">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 4V1L8 5l4 4V6c3.3 0 6 2.7 6 6 0 1-.3 2-.7 2.8l1.5 1.5C19.5 15.1 20 13.6 20 12c0-4.4-3.6-8-8-8Zm0 14c-3.3 0-6-2.7-6-6 0-1 .3-2 .7-2.8L5.2 7.7C4.5 8.9 4 10.4 4 12c0 4.4 3.6 8 8 8v3l4-4-4-4v3Z"/></svg>
    </button>
</header>

<main>
    <!-- TRẠNG THÁI ----------------------------------------------------------->
    <section class="card status-card">
        <div class="status-row">
            <span class="status-label">Trạng thái</span>
            <span id="status-pill" class="pill pill-loading">Đang kiểm tra…</span>
        </div>
        <div class="status-row">
            <span class="status-label">Zygisk</span>
            <span id="zygisk-pill" class="pill pill-mute">—</span>
        </div>
        <div class="status-row">
            <span class="status-label">SDK / ABI</span>
            <span id="sdk-info" class="status-value">—</span>
        </div>
        <div class="stats-grid">
            <div class="stat">
                <span class="stat-num" id="stat-targets">0</span>
                <span class="stat-cap">Quy tắc</span>
            </div>
            <div class="stat">
                <span class="stat-num" id="stat-includes">0</span>
                <span class="stat-cap">Bật</span>
            </div>
            <div class="stat">
                <span class="stat-num" id="stat-excludes">0</span>
                <span class="stat-cap">Loại trừ</span>
            </div>
        </div>
    </section>

    <!-- THÊM APP NHANH ------------------------------------------------------->
    <section class="card">
        <div class="card-head">
            <h2>Thêm app cần ẩn</h2>
            <button id="btn-pick" class="ghost-btn">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M11 7h2v6h-2zm0 8h2v2h-2zM12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2Zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8Z"/></svg>
                Chọn từ thiết bị
            </button>
        </div>
        <div class="input-row">
            <input id="pkg-input" type="text" placeholder="com.example.app" autocomplete="off" spellcheck="false">
            <button id="btn-add" class="primary-btn">Thêm</button>
        </div>
        <div id="suggest-list" class="suggest-list" hidden></div>
    </section>

    <!-- DANH SÁCH ------------------------------------------------------------>
    <section class="card">
        <div class="card-head">
            <h2>Danh sách quy tắc</h2>
            <span id="rules-count" class="badge">0</span>
        </div>
        <div id="rules" class="rules"></div>
        <div class="card-foot">
            <label class="switch">
                <input id="wildcard-toggle" type="checkbox">
                <span class="track"></span>
                <span class="switch-text">Bật cho tất cả app non-system (<code>*</code>)</span>
            </label>
        </div>
    </section>

    <!-- HÀNH ĐỘNG ------------------------------------------------------------>
    <section class="card">
        <h2>Hành động</h2>
        <div class="action-grid">
            <button id="btn-save" class="primary-btn">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm3-10H5V5h10v4Z"/></svg>
                Lưu cấu hình
            </button>
            <button id="btn-forcestop" class="ghost-btn">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 6h12v12H6z"/></svg>
                Force stop tất cả
            </button>
            <button id="btn-reboot" class="danger-btn">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M13 3a9 9 0 1 0 8.94 7.94l-2 .12A7 7 0 1 1 13 5V8l5-4-5-4v3Z"/></svg>
                Khởi động lại
            </button>
        </div>
    </section>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
